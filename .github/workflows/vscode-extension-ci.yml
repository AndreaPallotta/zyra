name: VSCode Extension CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install extension deps
        run: |
          cd vscode
          npm ci

      - name: Build extension
        run: |
          cd vscode
          npm run build

      - name: Run extension tests
        run: |
          cd vscode
          npm test
